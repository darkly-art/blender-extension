schema_version = "1.0.0"

id = "darkly_stream"
version = "0.4.1"
name = "Darkly"
tagline = "Stream the viewport or a camera view into a Darkly layer"
maintainer = "TheTechromancer <thetechromancer@protonmail.com>"
type = "add-on"
website = "https://darkly.art"

tags = ["Import-Export"]

blender_version_min = "5.1.0"

license = ["SPDX:GPL-3.0-or-later"]

# Keep dev/build artifacts and tests out of the shipped zip.
[build]
paths_exclude_pattern = [
  "__pycache__/",
  "*.pyc",
  "/tests/",
]
