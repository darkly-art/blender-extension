name: CI

on:
  pull_request:
  push:
    branches: [master]

# Cancel an in-progress run when a newer commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          # Match the interpreter Blender 5.1 bundles, so the tests run against
          # the same Python the add-on executes under at runtime.
          python-version: "3.14"
      - name: Install test dependencies
        # numpy + OpenImageIO ship inside Blender at runtime (the add-on bundles
        # nothing — the self-contained rule); Pillow is the independent decoder
        # the encode round-trip test cross-checks OIIO's output against.
        run: python -m pip install --upgrade numpy pillow OpenImageIO
      - name: Run tests
        run: python -m unittest discover -s tests -v

  extension:
    name: validate + build extension
    runs-on: ubuntu-latest
    env:
      # Newest 5.1.x stable; matches `blender_version_min` in the manifest.
      BLENDER_VERSION: "5.1.2"
    steps:
      - uses: actions/checkout@v7
      - name: Install Blender runtime libraries
        # Blender links these X/GL libs even under `--command` (no GUI); without
        # them the binary fails at load with "error while loading shared libraries".
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxrender1 libxi6 libxxf86vm1 libxfixes3 libxkbcommon0 libsm6 libgl1 \
            libxrandr2 libxinerama1 libxcursor1 libegl1
      - name: Install Blender ${{ env.BLENDER_VERSION }}
        run: |
          series="${BLENDER_VERSION%.*}"   # 5.1.2 -> 5.1 (the release directory)
          url="https://download.blender.org/release/Blender${series}/blender-${BLENDER_VERSION}-linux-x64.tar.xz"
          curl -fsSL "$url" -o /tmp/blender.tar.xz
          mkdir -p "$HOME/blender"
          tar -xf /tmp/blender.tar.xz -C "$HOME/blender" --strip-components=1
          echo "$HOME/blender" >> "$GITHUB_PATH"
      - name: Blender version
        run: blender --version
      - name: Validate extension manifest
        run: blender --command extension validate darkly
      - name: Build extension
        # `--output-dir` must already exist — Blender's builder won't create it.
        run: |
          mkdir -p dist
          blender --command extension build --source-dir darkly --output-dir dist
      - uses: actions/upload-artifact@v7
        with:
          name: darkly-extension
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: release
    # `push` only fires on master (see the trigger above), so this gates the
    # job to master pushes without re-running it for pull requests.
    if: github.event_name == 'push'
    needs: [tests, extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      # Both publishers reuse the validated zip the `extension` job just built,
      # and each self-gates on its own target's current state — so they publish
      # (or catch up) independently. Neither depends on the other having run.
      - uses: actions/download-artifact@v8
        with:
          name: darkly-extension
          path: dist
      - name: Read manifest
        id: manifest
        run: |
          version="$(sed -n 's/^version = "\(.*\)"$/\1/p' darkly/blender_manifest.toml)"
          ext_id="$(sed -n 's/^id = "\(.*\)"$/\1/p' darkly/blender_manifest.toml)"
          test -n "$version" && test -n "$ext_id"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "ext_id=${ext_id}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"
      - name: Publish GitHub release
        # Self-gates on the git tag: creates the release only when v<version>
        # does not already exist, so it is a no-op on pushes without a bump.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.manifest.outputs.tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" > /dev/null; then
            echo "::notice::${tag} already released — skipping GitHub release"
            exit 0
          fi
          gh release create "$tag" dist/*.zip --title "$tag" --generate-notes
      - name: Publish to the Blender Extensions Platform
        # Uploads to extensions.blender.org via its REST API
        # (https://developer.blender.org/docs/features/extensions/ci_cd/).
        # Self-gates on the platform's own currently published version rather
        # than on the GitHub release, so a failed or token-less earlier run is
        # retried on the next push instead of being skipped forever. Caveat: the
        # listing only reflects *approved* versions, so re-pushing master while a
        # freshly uploaded version is still awaiting moderation will attempt a
        # duplicate upload and fail loudly until that version is approved.
        env:
          GH_TOKEN: ${{ github.token }}
          BLENDER_EXTENSIONS_TOKEN: ${{ secrets.BLENDER_EXTENSIONS_TOKEN }}
        run: |
          # Skip cleanly when the secret is absent (e.g. a fork) so the GitHub
          # release still succeeds without the marketplace credential.
          if [ -z "$BLENDER_EXTENSIONS_TOKEN" ]; then
            echo "::notice::BLENDER_EXTENSIONS_TOKEN not set — skipping marketplace publish"
            exit 0
          fi
          ext_id="${{ steps.manifest.outputs.ext_id }}"
          version="${{ steps.manifest.outputs.version }}"
          published="$(curl -sSL --fail-with-body https://extensions.blender.org/api/v1/extensions/ \
            | jq -r --arg id "$ext_id" 'first(.data[] | select(.id == $id) | .version) // ""')"
          if [ "$published" = "$version" ]; then
            echo "::notice::${ext_id} ${version} already published — skipping marketplace upload"
            exit 0
          fi
          zip="$(ls dist/*.zip | head -n1)"
          notes="$(gh release view "${{ steps.manifest.outputs.tag }}" --json body -q .body 2>/dev/null || true)"
          curl -sSL --fail-with-body -X POST \
            "https://extensions.blender.org/api/v1/extensions/${ext_id}/versions/upload/" \
            -H "Authorization:bearer ${BLENDER_EXTENSIONS_TOKEN}" \
            -F "version_file=@${zip}" \
            -F "release_notes=${notes}"
